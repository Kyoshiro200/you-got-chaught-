
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Surrounded By Arrows</title>
    <style>
        /* Centers the main layout container on the screen */
        body { 
            background: #121212; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; /* Stack text above the image */
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Styling for the bold text header */
        .header-text {
            color: #ff0000; /* Pure Red to match the arrows */
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin: 0 0 20px 0; /* Creates space below the text */
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            user-select: none;
        }
        
        /* Relative container to hold the absolute positioned arrows */
        .wrapper { 
            position: relative; 
            width: 600px; 
            height: 500px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Styling for your central square photo */
        .main-photo { 
            width: 250px; 
            height: auto; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.8); 
            z-index: 10;
        }

        /* Base style for every arrow generated */
        .arrow { 
            position: absolute;
            color: #ff0000; 
            font-size: 2.2rem; 
            font-weight: bold;
            user-select: none;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <!-- BOLD TEXT HEADLINE -->
   <h1 class="header-text">CAUGHT IN 4K</h1>


    <div class="wrapper" id="arrowWrapper">
        <!-- The central square photo -->
        <img src="photo.png" alt="Our Photo" class="main-photo">
    </div>

    <script>
        const wrapper = document.getElementById('arrowWrapper');
        const totalArrows = 24; 
        const radius = 220;     

        for (let i = 0; i < totalArrows; i++) {
            const angle = (i / totalArrows) * 2 * Math.PI;
            
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            const rotationInDegrees = (angle * 180 / Math.PI) + 180;

            const arrow = document.createElement('div');
            arrow.className = 'arrow';
            arrow.innerHTML = '➔'; 
            
            arrow.style.left = `calc(50% + ${x}px - 15px)`;
            arrow.style.top = `calc(50% + ${y}px - 20px)`;
            arrow.style.transform = `rotate(${rotationInDegrees}deg)`;
            
            wrapper.appendChild(arrow);
        }
    </script>

</body>
</html>
